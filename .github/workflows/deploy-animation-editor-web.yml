name: Deploy Animation Editor (Web) to GitHub Pages

# #535 M4: publish the Avalonia.Browser build of the Animation Editor (tools/AnimationEditorAvalonia/
# src/AnimationEditor.Browser) as a static site under this repo's GitHub Pages, at /FlatRedBall2/AnimationEditor/.
# Manually triggered (not on every push) since this is still an early spike -- see
# tools/AnimationEditorAvalonia/docs/BROWSER_SPIKE_FINDINGS.md for what does/doesn't work yet
# (native file/folder pickers and drag-drop are implemented but unverified end-to-end).
#
# Mirrors deploy-sample.yml's approach (base-href rewrite for the Pages subpath, .nojekyll,
# stripping stray .gitignore files before actions-gh-pages' internal git add), with one addition
# this project needs that the KNI/BlazorGL samples don't: the wasm-tools workload, since
# AnimationEditor.Browser uses Microsoft's official Microsoft.NET.Sdk.WebAssembly rather than KNI.

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools --skip-sign-check

      - name: Publish AnimationEditor.Browser
        run: >
          dotnet publish
          tools/AnimationEditorAvalonia/src/AnimationEditor.Browser/AnimationEditor.Browser.csproj
          -c Release
          -o publish

      - name: Report bundle size
        shell: bash
        run: |
          echo "### Animation Editor (web) bundle size" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total \`wwwroot\` | $(du -sh publish/wwwroot | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Raw \`.wasm\`/\`.dll\` in \`_framework\` | $(find publish/wwwroot/_framework \( -name '*.wasm' -o -name '*.dll' \) | xargs du -ch 2>/dev/null | tail -1 | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Brotli-compressed (what a browser actually fetches) | $(find publish/wwwroot/_framework -name '*.br' | xargs du -ch 2>/dev/null | tail -1 | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Rewrite base href for GitHub Pages subpath
        shell: bash
        run: |
          sed -i 's|<base href="\./" />|<base href="/FlatRedBall2/AnimationEditor/" />|' \
            publish/wwwroot/index.html
          grep -q '<base href="/FlatRedBall2/AnimationEditor/"' publish/wwwroot/index.html

      - name: Add .nojekyll
        shell: bash
        run: touch publish/wwwroot/.nojekyll

      # actions-gh-pages does `git add` inside the publish dir, which honors any .gitignore files
      # it finds there. None exist in this project today, but strip defensively in case one is
      # added later -- see deploy-sample.yml, which hit this for real with its Content/.gitignore.
      - name: Strip .gitignore files from publish output
        shell: bash
        run: find publish/wwwroot -name .gitignore -delete

      - name: Deploy to gh-pages/AnimationEditor
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./publish/wwwroot
          destination_dir: AnimationEditor
          keep_files: true
          commit_message: 'Deploy Animation Editor (web) (${{ github.sha }})'
