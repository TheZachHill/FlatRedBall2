name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: dotnet test
    runs-on: ubuntu-latest
    steps:
      # FlatRedBall2 currently project-references Gum at ..\..\Gum from src/FlatRedBall2.csproj
      # for in-place iteration. Both repos must be cloned as siblings under $GITHUB_WORKSPACE
      # so the relative path resolves the same way it does locally. When FRB2 switches back to
      # the Gum NuGet packages, the Checkout Gum step and the working-directory entries can go.
      - name: Checkout FlatRedBall2
        uses: actions/checkout@v4
        with:
          path: FlatRedBall2

      - name: Checkout Gum
        uses: actions/checkout@v4
        with:
          repository: vchelaru/Gum
          ref: main
          path: Gum

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('FlatRedBall2/**/*.csproj', 'Gum/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # -p:TargetFramework=net10.0 keeps MSBuild from evaluating Gum's net9.0-ios / wasm
      # TFM branches, which would otherwise demand iOS/wasm workloads the runner doesn't
      # have. The test project is net10.0-only, so no coverage is lost. Drop this if a
      # future CI job needs to build the KNI (net8.0) variant of FRB2.
      - name: Restore
        working-directory: FlatRedBall2
        run: dotnet restore tests/FlatRedBall2.Tests/FlatRedBall2.Tests.csproj -p:TargetFramework=net10.0

      - name: Test
        working-directory: FlatRedBall2
        run: dotnet test tests/FlatRedBall2.Tests/FlatRedBall2.Tests.csproj --no-restore --verbosity normal -p:TargetFramework=net10.0
